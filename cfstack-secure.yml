AWSTemplateFormatVersion: '2010-09-09'
Description: '503AZ CivicNexus secure test stack.'

Parameters:
  GroupName:
    Type: String
    Description: The unique group name or number to tag resources (e.g., Group-01).
  GroupSize:
    Type: Number
    Description: The number of students in the group.
    Default: 2
    AllowedValues: [2, 3]
  KeyName:
    Type: 'AWS::EC2::KeyPair::KeyName'
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instances.
  AdminAccessCidr:
    Type: String
    Description: CIDR allowed to reach the admin VPN server. Use your public IP with /32 where possible.
    Default: 0.0.0.0/0
    AllowedPattern: '^(([0-9]{1,3}\.){3}[0-9]{1,3})/([0-9]|[1-2][0-9]|3[0-2])$'
  MongoAdminUsername:
    Type: String
    Description: Admin username created inside MongoDB.
    Default: mongoAdmin
    AllowedPattern: '^[A-Za-z][A-Za-z0-9_]{2,31}$'
  MongoAdminPassword:
    Type: String
    Description: Admin password for MongoDB. Use letters, numbers, and underscores to avoid URI escaping issues.
    NoEcho: true
    MinLength: 12
    AllowedPattern: '^[A-Za-z0-9_]{12,64}$'
  MongoAppUsername:
    Type: String
    Description: Application username used by the PHP dashboard.
    Default: civicApp
    AllowedPattern: '^[A-Za-z][A-Za-z0-9_]{2,31}$'
  MongoAppPassword:
    Type: String
    Description: Application password for the PHP dashboard MongoDB user. Use letters, numbers, and underscores to avoid URI escaping issues.
    NoEcho: true
    MinLength: 12
    AllowedPattern: '^[A-Za-z0-9_]{12,64}$'
  TravelQuestApiToken:
    Type: String
    Description: Bearer token used to protect the 402AZ TravelQuest trial API.
    NoEcho: true
    MinLength: 20
    AllowedPattern: '^[A-Za-z0-9_]{20,128}$'
  EnableAdvancedEvidenceResources:
    Type: String
    Description: Create VPC Flow Logs and S3 backup evidence resources. Keep false in AWS Academy labs if IAM role creation is blocked.
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'

Conditions:
  CreateVDI: !Equals [!Ref GroupSize, 3]
  CreateAdvancedEvidenceResources: !Equals [!Ref EnableAdvancedEvidenceResources, 'true']

Resources:
  # ------------------------------------------------------------#
  # Networking
  # ------------------------------------------------------------#
  VPC:
    Type: 'AWS::EC2::VPC'
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub 'vpc_shared_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  InternetGateway:
    Type: 'AWS::EC2::InternetGateway'
    Properties:
      Tags:
        - Key: GroupName
          Value: !Ref GroupName

  AttachGateway:
    Type: 'AWS::EC2::VPCGatewayAttachment'
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'public1_shared_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  PublicSubnet2:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'public2_shared_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  PrivateSubnet1:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub 'private1_shared_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  PrivateSubnet2:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub 'private2_shared_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  PrivateSubnet3:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.12.0/24
      AvailabilityZone: !Select [2, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub 'private3_shared_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName
  
  PublicRouteTable:
    Type: 'AWS::EC2::RouteTable'
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub 'publicRT_shared_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  DefaultPublicRoute:
    Type: 'AWS::EC2::Route'
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
  
  PublicSubnet1RouteTableAssociation:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable
      
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub 'privateRT_shared_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  NatGatewayElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub 'natIP_shared_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayElasticIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub 'natGW_shared_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: NatGateway
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnet1

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnet2

  PrivateSubnet3RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnet3

  # ------------------------------------------------------------#
  # Admin VPN Access
  # ------------------------------------------------------------#
  OpenVPNSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Allows administrator OpenVPN access into the VPC'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: udp
          FromPort: 1194
          ToPort: 1194
          CidrIp: !Ref AdminAccessCidr
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AdminAccessCidr
      Tags:
        - Key: Name
          Value: !Sub 'openVPN_SG_mike_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  OpenVPNInstance:
    Type: 'AWS::EC2::Instance'
    DependsOn: DefaultPublicRoute
    Properties:
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      SourceDestCheck: false
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Ref PublicSubnet2
          GroupSet:
            - !Ref OpenVPNSecurityGroup
      ImageId: ami-00ca32bbc84273381 # Amazon Linux 2023
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -xe

          dnf update -y
          dnf install -y openvpn iptables-services openssl

          mkdir -p /etc/openvpn/server /etc/openvpn/client-config /etc/openvpn/pki

          cat <<'EOF' > /home/ec2-user/README_openvpn.txt
          OpenVPN packages are installed by CloudFormation.
          Configure certificates, server.conf, routing and the client profile manually.
          The team script is scripts/manual_openvpn_setup.sh.
          EOF

          chown ec2-user:ec2-user /home/ec2-user/README_openvpn.txt
      Tags:
        - Key: Name
          Value: !Sub 'openVPN_EC2_mike_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  OpenVPNElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub 'openVPN_EIP_mike_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  OpenVPNElasticIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt OpenVPNElasticIP.AllocationId
      InstanceId: !Ref OpenVPNInstance

  VpcFlowLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: CreateAdvancedEvidenceResources
    Properties:
      RetentionInDays: 7
      Tags:
        - Key: Name
          Value: !Sub 'flowLogs_shared_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  VpcFlowLogsRole:
    Type: AWS::IAM::Role
    Condition: CreateAdvancedEvidenceResources
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: WriteVpcFlowLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub '${VpcFlowLogGroup.Arn}:*'
      Tags:
        - Key: GroupName
          Value: !Ref GroupName

  VpcFlowLog:
    Type: AWS::EC2::FlowLog
    Condition: CreateAdvancedEvidenceResources
    Properties:
      DeliverLogsPermissionArn: !GetAtt VpcFlowLogsRole.Arn
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref VpcFlowLogGroup
      ResourceId: !Ref VPC
      ResourceType: VPC
      TrafficType: ALL
      Tags:
        - Key: Name
          Value: !Sub 'vpcFlow_shared_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  MongoBackupBucket:
    Type: AWS::S3::Bucket
    Condition: CreateAdvancedEvidenceResources
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteLabBackupsAfterSevenDays
            Status: Enabled
            ExpirationInDays: 7
      Tags:
        - Key: Name
          Value: !Sub 'mongoBackups_mike_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  MongoBackupRole:
    Type: AWS::IAM::Role
    Condition: CreateAdvancedEvidenceResources
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: MongoBackupS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt MongoBackupBucket.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub '${MongoBackupBucket.Arn}/*'
      Tags:
        - Key: GroupName
          Value: !Ref GroupName

  MongoBackupInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Condition: CreateAdvancedEvidenceResources
    Properties:
      Roles:
        - !Ref MongoBackupRole

  # ------------------------------------------------------------#
  # Asset 2: MongoDB EC2 Instance (Student 2)
  # ------------------------------------------------------------#
  MongoSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Allows MongoDB only from the webserver security group'
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub 'mongo_SG_mike_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  MongoIngressFromWebServer:
    Type: 'AWS::EC2::SecurityGroupIngress'
    Properties:
      GroupId: !Ref MongoSecurityGroup
      IpProtocol: tcp
      FromPort: 27017
      ToPort: 27017
      SourceSecurityGroupId: !Ref WebServerSecurityGroup

  MongoIngressFromOpenVPN:
    Type: 'AWS::EC2::SecurityGroupIngress'
    Properties:
      GroupId: !Ref MongoSecurityGroup
      IpProtocol: tcp
      FromPort: 27017
      ToPort: 27017
      SourceSecurityGroupId: !Ref OpenVPNSecurityGroup

  MongoIngressFromReplicaMembers:
    Type: 'AWS::EC2::SecurityGroupIngress'
    Properties:
      GroupId: !Ref MongoSecurityGroup
      IpProtocol: tcp
      FromPort: 27017
      ToPort: 27017
      SourceSecurityGroupId: !Ref MongoSecurityGroup

  MongoSSHFromOpenVPN:
    Type: 'AWS::EC2::SecurityGroupIngress'
    Properties:
      GroupId: !Ref MongoSecurityGroup
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      SourceSecurityGroupId: !Ref OpenVPNSecurityGroup

  MongoEC2Instance:
    Type: 'AWS::EC2::Instance'
    DependsOn:
      - PrivateDefaultRoute
      - MongoIngressFromReplicaMembers
      - MongoReplicaInstance2
      - MongoReplicaInstance3
    Properties:
      InstanceType: t3.small
      SubnetId: !Ref PrivateSubnet1
      PrivateIpAddress: 10.0.10.10
      KeyName: !Ref KeyName
      IamInstanceProfile: !If [CreateAdvancedEvidenceResources, !Ref MongoBackupInstanceProfile, !Ref 'AWS::NoValue']
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      SecurityGroupIds:
        - !Ref MongoSecurityGroup
      ImageId: ami-00ca32bbc84273381 # Amazon Linux 2023
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -xe

          cat <<'EOF' > /etc/yum.repos.d/mongodb-org-7.0.repo
          [mongodb-org-7.0]
          name=MongoDB Repository
          baseurl=https://repo.mongodb.org/yum/amazon/2023/mongodb-org/7.0/x86_64/
          gpgcheck=1
          enabled=1
          gpgkey=https://www.mongodb.org/static/pgp/server-7.0.asc
          EOF
          dnf install -y mongodb-org
          dnf install -y awscli || true

          systemctl enable mongod
          systemctl start mongod

          cat <<'EOF' > /home/ec2-user/README_mongo.txt
          MongoDB and AWS CLI are installed by CloudFormation.
          Replica set, bind address, users, seed data and backup checks are manual steps.
          Use the scripts in the repo:
          - scripts/manual_mongodb_node_setup.sh
          - scripts/manual_mongodb_primary_setup.sh
          EOF
          chown ec2-user:ec2-user /home/ec2-user/README_mongo.txt
      Tags:
        - Key: Name
          Value: !Sub 'mongo1_mike_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  MongoReplicaInstance2:
    Type: 'AWS::EC2::Instance'
    DependsOn:
      - PrivateDefaultRoute
      - MongoIngressFromReplicaMembers
    Properties:
      InstanceType: t3.small
      SubnetId: !Ref PrivateSubnet2
      PrivateIpAddress: 10.0.11.10
      KeyName: !Ref KeyName
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      SecurityGroupIds:
        - !Ref MongoSecurityGroup
      ImageId: ami-00ca32bbc84273381 # Amazon Linux 2023
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -xe

          cat <<'EOF' > /etc/yum.repos.d/mongodb-org-7.0.repo
          [mongodb-org-7.0]
          name=MongoDB Repository
          baseurl=https://repo.mongodb.org/yum/amazon/2023/mongodb-org/7.0/x86_64/
          gpgcheck=1
          enabled=1
          gpgkey=https://www.mongodb.org/static/pgp/server-7.0.asc
          EOF
          dnf install -y mongodb-org

          systemctl enable mongod
          systemctl start mongod

          cat <<'EOF' > /home/ec2-user/README_mongo.txt
          MongoDB is installed by CloudFormation.
          Configure this node manually with scripts/manual_mongodb_node_setup.sh.
          EOF
          chown ec2-user:ec2-user /home/ec2-user/README_mongo.txt
      Tags:
        - Key: Name
          Value: !Sub 'mongo2_mike_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  MongoReplicaInstance3:
    Type: 'AWS::EC2::Instance'
    DependsOn:
      - PrivateDefaultRoute
      - MongoIngressFromReplicaMembers
    Properties:
      InstanceType: t3.small
      SubnetId: !Ref PrivateSubnet3
      PrivateIpAddress: 10.0.12.10
      KeyName: !Ref KeyName
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      SecurityGroupIds:
        - !Ref MongoSecurityGroup
      ImageId: ami-00ca32bbc84273381 # Amazon Linux 2023
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -xe

          cat <<'EOF' > /etc/yum.repos.d/mongodb-org-7.0.repo
          [mongodb-org-7.0]
          name=MongoDB Repository
          baseurl=https://repo.mongodb.org/yum/amazon/2023/mongodb-org/7.0/x86_64/
          gpgcheck=1
          enabled=1
          gpgkey=https://www.mongodb.org/static/pgp/server-7.0.asc
          EOF
          dnf install -y mongodb-org

          systemctl enable mongod
          systemctl start mongod

          cat <<'EOF' > /home/ec2-user/README_mongo.txt
          MongoDB is installed by CloudFormation.
          Configure this node manually with scripts/manual_mongodb_node_setup.sh.
          EOF
          chown ec2-user:ec2-user /home/ec2-user/README_mongo.txt
      Tags:
        - Key: Name
          Value: !Sub 'mongo3_mike_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName
          
  # ------------------------------------------------------------#
  # Asset 1: Public Web Server (Student 1)
  # ------------------------------------------------------------#
  WebServerSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Allows HTTP traffic to the web dashboard'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub 'web_SG_pantelis_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName
          
  WebServerInstance:
    Type: 'AWS::EC2::Instance'
    Properties:
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Ref PublicSubnet1
          GroupSet:
            - !Ref WebServerSecurityGroup
      ImageId: ami-00ca32bbc84273381 # Amazon Linux 2023
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -xe
        
          # Update packages
          dnf update -y
        
          # Add MongoDB repository
          cat <<EOF > /etc/yum.repos.d/mongodb-org-7.0.repo
          [mongodb-org-7.0]
          name=MongoDB Repository
          baseurl=https://repo.mongodb.org/yum/amazon/2023/mongodb-org/7.0/x86_64/
          gpgcheck=1
          enabled=1
          gpgkey=https://www.mongodb.org/static/pgp/server-7.0.asc
          EOF
        
          # Install the web server and PHP packages
          dnf install -y httpd php php-fpm php-pear php-devel gcc make \
                         php-cli php-json php-openssl unzip libzstd-devel
        
          # Composer needs HOME set during install
          export HOME=/root
          
          # Install Composer globally
          curl -sS https://getcomposer.org/installer | php
          mv composer.phar /usr/local/bin/composer
          chmod +x /usr/local/bin/composer
          composer --version
        
          # Install MongoDB PHP Driver via PECL
          pecl channel-update pecl.php.net
          printf "\n" | pecl install mongodb-1.21.2
          echo "extension=mongodb.so" > /etc/php.d/50-mongodb.ini
        
          # Log errors instead of showing them on the page
          sed -i 's/^display_errors = .*/display_errors = Off/' /etc/php.ini
          sed -i 's/^log_errors = .*/log_errors = On/' /etc/php.ini
        
          # Allow Apache network access
          setsebool -P httpd_can_network_connect 1

          # Reduce HTTP information leakage from Apache responses
          cat <<'EOF' > /etc/httpd/conf.d/security-headers.conf
          ServerTokens Prod
          ServerSignature Off
          TraceEnable Off
          Header always set X-Content-Type-Options "nosniff"
          Header always set X-Frame-Options "DENY"
          Header always set Referrer-Policy "no-referrer"
          Header always set Cache-Control "no-store"
          SetEnvIfNoCase Authorization "^(.*)" HTTP_AUTHORIZATION=$1
          <Directory "/var/www/html">
              Options -Indexes
          </Directory>
          EOF
        
          # Write dashboard app
          cat <<'EOF' > /var/www/html/index.php
          <?php
          ini_set('display_errors', 0);
          ini_set('display_startup_errors', 0);
          ini_set('log_errors', 1);
          error_reporting(E_ALL);

          $mongoHosts = "${MongoEC2Instance.PrivateIp}:27017,${MongoReplicaInstance2.PrivateIp}:27017,${MongoReplicaInstance3.PrivateIp}:27017";
          $mongoUser = "${MongoAppUsername}";
          $mongoPassword = "${MongoAppPassword}";
          $uri = "mongodb://" . rawurlencode($mongoUser) . ":" . rawurlencode($mongoPassword) . "@$mongoHosts/civicnexus?authSource=civicnexus&replicaSet=rs0";
        
          try {
              require '/var/www/html/vendor/autoload.php';
              $client = new MongoDB\Client($uri, [], [
                  'serverSelectionTimeoutMS' => 2000,
                  'connectTimeoutMS' => 2000
              ]);
              $db = $client->civicnexus;
          ?>
          <!DOCTYPE html>
          <html>
          <head>
              <title>CivicNexus Smart City Dashboard</title>
              <style>
                  body { font-family: Arial, sans-serif; margin: 2em; background-color: #f4f4f4; color: #333; }
                h1 { color: #005ea8; }
                  details { margin-bottom: 1.5em; }
                summary { font-size: 1.2em; font-weight: bold; color: #005ea8; cursor: pointer; }
                  table { border-collapse: collapse; width: 100%; margin-top: 1em; box-shadow: 0 2px 3px rgba(0,0,0,0.1); }
                  th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
                th { background-color: #005ea8; color: white; }
                  tr:nth-child(even) { background-color: #f9f9f9; }
                  .error { color: red; font-weight: bold; }
                  pre { margin: 0; font-size: 0.9em; }
              </style>
          </head>
          <body>
              <h1>CivicNexus Live City Operations Data</h1>
        
              <!-- Urban and Environmental Data -->
              <details open>
              <summary>Urban & Environmental Data</summary>
                <table>
                <tr><th>Record ID</th><th>Data Type</th><th>Location</th><th>Reading</th><th>Timestamp</th></tr>
                <?php foreach ($db->urban_environment_data->find() as $doc): ?>
                        <tr>
                    <td><?= htmlspecialchars($doc['record_id'] ?? 'N/A') ?></td>
                    <td><?= htmlspecialchars($doc['data_type'] ?? 'N/A') ?></td>
                    <td><?= htmlspecialchars($doc['location'] ?? 'N/A') ?></td>
                    <td><?= htmlspecialchars($doc['reading_value'] ?? 'N/A') ?> <?= htmlspecialchars($doc['unit'] ?? '') ?></td>
                    <td><?= $doc['timestamp'] ? htmlspecialchars($doc['timestamp']->toDateTime()->format('Y-m-d H:i:s')) : 'N/A' ?></td>
