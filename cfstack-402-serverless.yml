AWSTemplateFormatVersion: '2010-09-09'
Description: '402-style CivicNexus add-on using Cognito, API Gateway, Lambda and the existing private MongoDB-backed web tier.'

Parameters:
  ProjectName:
    Type: String
    Description: Short name used in serverless resource names.
    Default: civicnexus
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9-]{2,30}$'
  GroupName:
    Type: String
    Description: Group name used by the secure stack exports.
    Default: civicnexus
  AllowedOrigin:
    Type: String
    Description: Browser origin allowed to call the API. Use * for lab testing only.
    Default: '*'

Resources:
  CivicNexusUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${ProjectName}-operators'
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false

  CivicNexusUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${ProjectName}-frontend'
      UserPoolId: !Ref CivicNexusUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED

  CivicNexusLambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda egress to the private CivicNexus web API
      VpcId:
        Fn::ImportValue: !Sub '${GroupName}-CivicNexusVpcId'
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          DestinationSecurityGroupId:
            Fn::ImportValue: !Sub '${GroupName}-CivicNexusWebSecurityGroupId'
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  CivicNexusApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-mongodb-api'
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !Sub 'arn:aws:iam::${AWS::AccountId}:role/LabRole'
      Timeout: 12
      MemorySize: 128
      VpcConfig:
        SecurityGroupIds:
          - !Ref CivicNexusLambdaSecurityGroup
        SubnetIds:
          - Fn::ImportValue: !Sub '${GroupName}-CivicNexusPrivateSubnet1Id'
          - Fn::ImportValue: !Sub '${GroupName}-CivicNexusPrivateSubnet2Id'
      Environment:
        Variables:
          ALLOWED_ORIGIN: !Ref AllowedOrigin
          BACKEND_URL: !Join
            - ''
            - - 'http://'
              - Fn::ImportValue: !Sub '${GroupName}-CivicNexusWebPrivateIp'
              - '/internal/402-mongo.php'
      Code:
        ZipFile: |
          const allowedOrigin = process.env.ALLOWED_ORIGIN || "*";
          const backendUrl = process.env.BACKEND_URL;

          const headers = {
            "Access-Control-Allow-Origin": allowedOrigin,
            "Access-Control-Allow-Headers": "Content-Type,Authorization",
            "Access-Control-Allow-Methods": "GET,POST,OPTIONS",
            "Content-Type": "application/json",
            "Cache-Control": "no-store"
          };

          function reply(statusCode, body) {
            return { statusCode, headers, body: JSON.stringify(body) };
          }

          function identity(event) {
            const claims = event.requestContext?.authorizer?.jwt?.claims || {};
            return claims.email || claims.username || claims.sub || "unknown";
          }

          async function callMongoBackend(event) {
            const method = event.requestContext?.http?.method || event.httpMethod;
            const operator = identity(event);
            const options = {
              method,
              headers: {
                "Content-Type": "application/json",
                "X-Authenticated-Operator": operator
              }
            };

            if (method === "POST") {
              const incoming = JSON.parse(event.body || "{}");
              options.body = JSON.stringify({
                note: incoming.note || "",
                operator
              });
            }

            const response = await fetch(backendUrl, options);
            const text = await response.text();
            let body = {};
            if (text) {
              try {
                body = JSON.parse(text);
              } catch {
                body = { message: text };
              }
            }

            return reply(response.status, {
              ...body,
              authenticated_operator: operator,
              auth_source: "cognito-jwt"
            });
          }

          exports.handler = async (event) => {
            const method = event.requestContext?.http?.method || event.httpMethod;
            const path = event.rawPath || event.path || "/";

            if (method === "OPTIONS") return reply(204, {});
            if (path.endsWith("/items") && (method === "GET" || method === "POST")) {
              return callMongoBackend(event);
            }

            return reply(404, { message: "route not found" });
          };

  CivicNexusHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${ProjectName}-mongodb-api'
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

  CivicNexusApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref CivicNexusHttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt CivicNexusApiFunction.Arn
      PayloadFormatVersion: '2.0'

  CivicNexusJwtAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref CivicNexusHttpApi
      AuthorizerType: JWT
      IdentitySource:
        - '$request.header.Authorization'
      Name: !Sub '${ProjectName}-cognito-authorizer'
      JwtConfiguration:
        Audience:
          - !Ref CivicNexusUserPoolClient
        Issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${CivicNexusUserPool}'

  ItemsGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref CivicNexusHttpApi
      RouteKey: 'GET /items'
      AuthorizationType: JWT
      AuthorizerId: !Ref CivicNexusJwtAuthorizer
      Target: !Sub 'integrations/${CivicNexusApiIntegration}'

  ItemsPostRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref CivicNexusHttpApi
      RouteKey: 'POST /items'
      AuthorizationType: JWT
      AuthorizerId: !Ref CivicNexusJwtAuthorizer
      Target: !Sub 'integrations/${CivicNexusApiIntegration}'

  CivicNexusDefaultStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref CivicNexusHttpApi
      StageName: '$default'
      AutoDeploy: true

  CivicNexusLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref CivicNexusApiFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CivicNexusHttpApi}/*/*'

Outputs:
  ServerlessApiUrl:
    Description: API Gateway base URL for the 402 MongoDB-backed API.
    Value: !GetAtt CivicNexusHttpApi.ApiEndpoint
  ItemsApiUrl:
    Description: Cognito-protected API route backed by MongoDB.
    Value: !Sub '${CivicNexusHttpApi.ApiEndpoint}/items'
  CognitoUserPoolId:
    Description: Cognito user pool ID for Amplify Auth.
    Value: !Ref CivicNexusUserPool
  CognitoUserPoolClientId:
    Description: Cognito user pool client ID for Amplify Auth.
    Value: !Ref CivicNexusUserPoolClient
  AmplifyEnvExample:
    Description: Values to copy into frontend/.env.local before building the Amplify frontend.
    Value: !Sub 'VITE_AWS_REGION=${AWS::Region} VITE_USER_POOL_ID=${CivicNexusUserPool} VITE_USER_POOL_CLIENT_ID=${CivicNexusUserPoolClient} VITE_API_BASE_URL=${CivicNexusHttpApi.ApiEndpoint}'
