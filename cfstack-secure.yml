AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation stack for the 503AZ CivicNexus project with first webserver security changes.'

Parameters:
  GroupName:
    Type: String
    Description: The unique group name or number to tag resources (e.g., Group-01).
  GroupSize:
    Type: Number
    Description: The number of students in the group.
    Default: 2
    AllowedValues: [2, 3]
  KeyName:
    Type: 'AWS::EC2::KeyPair::KeyName'
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instances.
  MongoAdminUsername:
    Type: String
    Description: Admin username created inside MongoDB.
    Default: mongoAdmin
    AllowedPattern: '^[A-Za-z][A-Za-z0-9_]{2,31}$'
  MongoAdminPassword:
    Type: String
    Description: Admin password for MongoDB. Use letters, numbers, and underscores to avoid URI escaping issues.
    NoEcho: true
    MinLength: 12
    AllowedPattern: '^[A-Za-z0-9_]{12,64}$'
  MongoAppUsername:
    Type: String
    Description: Application username used by the PHP dashboard.
    Default: civicApp
    AllowedPattern: '^[A-Za-z][A-Za-z0-9_]{2,31}$'
  MongoAppPassword:
    Type: String
    Description: Application password for the PHP dashboard MongoDB user. Use letters, numbers, and underscores to avoid URI escaping issues.
    NoEcho: true
    MinLength: 12
    AllowedPattern: '^[A-Za-z0-9_]{12,64}$'

Conditions:
  CreateVDI: !Equals [!Ref GroupSize, 3]

Resources:
  # ------------------------------------------------------------#
  # Networking
  # ------------------------------------------------------------#
  VPC:
    Type: 'AWS::EC2::VPC'
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-vpc-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  InternetGateway:
    Type: 'AWS::EC2::InternetGateway'
    Properties:
      Tags:
        - Key: GroupName
          Value: !Ref GroupName

  AttachGateway:
    Type: 'AWS::EC2::VPCGatewayAttachment'
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-public-subnet-1-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  PublicSubnet2:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-public-subnet-2-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  PrivateSubnet1:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-private-subnet-1-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  PrivateSubnet2:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-private-subnet-2-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName
  
  PublicRouteTable:
    Type: 'AWS::EC2::RouteTable'
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-public-rt-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  DefaultPublicRoute:
    Type: 'AWS::EC2::Route'
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
  
  PublicSubnet1RouteTableAssociation:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable
      
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-private-rt-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  NatGatewayElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-nat-eip-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayElasticIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-nat-gateway-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: NatGateway
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnet1

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnet2

  # ------------------------------------------------------------#
  # Asset 2: MongoDB EC2 Instance (Student 2)
  # ------------------------------------------------------------#
  MongoSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Allows MongoDB only from the webserver security group'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 27017
          ToPort: 27017
          SourceSecurityGroupId: !Ref WebServerSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-mongodb-sg-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  MongoEC2Instance:
    Type: 'AWS::EC2::Instance'
    DependsOn: PrivateDefaultRoute
    Properties:
      InstanceType: t3.small
      SubnetId: !Ref PrivateSubnet1
      KeyName: !Ref KeyName
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      SecurityGroupIds:
        - !Ref MongoSecurityGroup
      ImageId: ami-00ca32bbc84273381 # Amazon Linux 2023
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # Install MongoDB for smart city operational data
          echo "[mongodb-org-7.0]" >> /etc/yum.repos.d/mongodb-org-7.0.repo
          echo "name=MongoDB Repository" >> /etc/yum.repos.d/mongodb-org-7.0.repo
          echo "baseurl=https://repo.mongodb.org/yum/amazon/2023/mongodb-org/7.0/x86_64/" >> /etc/yum.repos.d/mongodb-org-7.0.repo
          echo "gpgcheck=1" >> /etc/yum.repos.d/mongodb-org-7.0.repo
          echo "enabled=1" >> /etc/yum.repos.d/mongodb-org-7.0.repo
          echo "gpgkey=https://www.mongodb.org/static/pgp/server-7.0.asc" >> /etc/yum.repos.d/mongodb-org-7.0.repo
          dnf install -y mongodb-org
          # Start and enable MongoDB
          systemctl start mongod
          systemctl enable mongod
          # Listen for VPC clients that are allowed by the security group
          sed -i 's/bindIp: 127.0.0.1/bindIp: 0.0.0.0/g' /etc/mongod.conf
          systemctl restart mongod

          # Wait for MongoDB before loading local demo data
          for attempt in {1..30}; do
            if mongosh mongodb://127.0.0.1:27017 --quiet --eval 'db.adminCommand({ping:1})' >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done

          # Seed demo data locally because MongoDB is not publicly reachable
          cat <<'EOF' > /tmp/seed_civicnexus.js
          db = db.getSiblingDB('civicnexus');

          db.urban_environment_data.drop();
          db.personnel_data.drop();
          db.system_operational_logs.drop();

          db.urban_environment_data.insertMany([
              {
                  record_id: "traffic-flow-001",
                  data_type: "traffic_flow_monitor",
                  location: "Central Avenue / Sector 4",
                  timestamp: new Date("2026-04-29T08:15:00Z"),
                  reading_value: 428,
                  unit: "vehicles/hour",
                  metadata: {
                      sensor_vendor: "CivicSense",
                      status: "normal"
                  }
              },
              {
                  record_id: "air-quality-014",
                  data_type: "air_quality_reading",
                  location: "Riverside Monitoring Station",
                  timestamp: new Date("2026-04-29T08:20:00Z"),
                  reading_value: 41,
                  unit: "AQI",
                  metadata: {
                      pm25: 12,
                      pm10: 18,
                      status: "good"
                  }
              }
          ]);

          db.personnel_data.insertMany([
              {
                  employee_id: "CN-001",
                  name: "Dr. Maya Patel",
                  job_role: "Urban Planner",
                  contact: "maya.patel@civicnexus.local",
                  security_clearance: "Level 3"
              },
              {
                  employee_id: "CN-014",
                  name: "Jordan Ellis",
                  job_role: "Field Technician",
                  contact: "jordan.ellis@civicnexus.local",
                  security_clearance: "Level 2"
              }
          ]);

          db.system_operational_logs.insertMany([
              {
                  log_id: "log-traffic-9001",
                  timestamp: new Date("2026-04-29T08:25:00Z"),
                  subsystem: "Traffic Light Control",
                  event_type: "sequence_update",
                  details: {
                      junction: "A12",
                      plan: "peak_morning_adjustment",
                      green_seconds: 42
                  }
              },
              {
                  log_id: "log-waste-9002",
                  timestamp: new Date("2026-04-29T08:40:00Z"),
                  subsystem: "Waste Management Dispatch",
                  event_type: "route_optimised",
                  details: {
                      district: "North Dock",
                      crew_id: "WM-07",
                      pickup_priority: "high"
                  }
              },
              {
                  log_id: "log-transport-9003",
                  timestamp: new Date("2026-04-29T08:55:00Z"),
                  subsystem: "Public Transport Dispatch",
                  event_type: "service_alert",
                  details: {
                      line: "TR-16",
                      status: "minor_delay",
                      reason: "signal_check_in_progress"
                  }
              }
          ]);

          print("CivicNexus database populated successfully.");
          EOF
          mongosh mongodb://127.0.0.1:27017 /tmp/seed_civicnexus.js
          rm -f /tmp/seed_civicnexus.js

          # Create database users before enabling access control
          cat <<'EOF' > /tmp/create_mongo_users.js
          db = db.getSiblingDB('admin');
          db.createUser({
              user: "${MongoAdminUsername}",
              pwd: "${MongoAdminPassword}",
              roles: [ { role: "root", db: "admin" } ]
          });

          db = db.getSiblingDB('civicnexus');
          db.createUser({
              user: "${MongoAppUsername}",
              pwd: "${MongoAppPassword}",
              roles: [ { role: "readWrite", db: "civicnexus" } ]
          });

          print("MongoDB users created successfully.");
          EOF
          mongosh mongodb://127.0.0.1:27017 /tmp/create_mongo_users.js
          rm -f /tmp/create_mongo_users.js

          # Enable MongoDB authentication after users are created
          cat <<'EOF' >> /etc/mongod.conf

          security:
            authorization: enabled
          EOF
          systemctl restart mongod

          for attempt in {1..30}; do
            if mongosh "mongodb://${MongoAppUsername}:${MongoAppPassword}@127.0.0.1:27017/civicnexus?authSource=civicnexus" --quiet --eval 'db.runCommand({ping:1})' >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-mongodb-instance-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName
          
  # ------------------------------------------------------------#
  # Asset 1: Public Web Server (Student 1)
  # ------------------------------------------------------------#
  WebServerSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Allows HTTP traffic to the web dashboard'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-web-server-sg-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName
          
  WebServerInstance:
    Type: 'AWS::EC2::Instance'
    Properties:
      InstanceType: t2.micro
      SubnetId: !Ref PublicSubnet1
      KeyName: !Ref KeyName
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      SecurityGroupIds:
        - !Ref WebServerSecurityGroup
      ImageId: ami-00ca32bbc84273381 # Amazon Linux 2023
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -xe
        
          # Update packages
          dnf update -y
        
          # Add MongoDB repository
          cat <<EOF > /etc/yum.repos.d/mongodb-org-7.0.repo
          [mongodb-org-7.0]
          name=MongoDB Repository
          baseurl=https://repo.mongodb.org/yum/amazon/2023/mongodb-org/7.0/x86_64/
          gpgcheck=1
          enabled=1
          gpgkey=https://www.mongodb.org/static/pgp/server-7.0.asc
          EOF
        
          # Install the web server and PHP packages
          dnf install -y httpd php php-fpm php-pear php-devel gcc make \
                         php-cli php-json php-openssl unzip libzstd-devel
        
          # Composer needs HOME set during install
          export HOME=/root
          
          # Install Composer globally
          curl -sS https://getcomposer.org/installer | php
          mv composer.phar /usr/local/bin/composer
          chmod +x /usr/local/bin/composer
          composer --version
        
          # Install MongoDB PHP Driver via PECL
          pecl channel-update pecl.php.net
          printf "\n" | pecl install mongodb-1.21.2
          echo "extension=mongodb.so" > /etc/php.d/50-mongodb.ini
        
          # Log errors instead of showing them on the page
          sed -i 's/^display_errors = .*/display_errors = Off/' /etc/php.ini
          sed -i 's/^log_errors = .*/log_errors = On/' /etc/php.ini
        
          # Allow Apache network access
          setsebool -P httpd_can_network_connect 1

          # Reduce HTTP information leakage from Apache responses
          cat <<'EOF' > /etc/httpd/conf.d/security-headers.conf
          ServerTokens Prod
          ServerSignature Off
          TraceEnable Off
          Header always set X-Content-Type-Options "nosniff"
          Header always set X-Frame-Options "DENY"
          Header always set Referrer-Policy "no-referrer"
          Header always set Cache-Control "no-store"
          <Directory "/var/www/html">
              Options -Indexes
          </Directory>
          EOF
        
          # Write dashboard app
          cat <<'EOF' > /var/www/html/index.php
          <?php
          ini_set('display_errors', 0);
          ini_set('display_startup_errors', 0);
          ini_set('log_errors', 1);
          error_reporting(E_ALL);

          $mongoIp = "${MongoEC2Instance.PrivateIp}";
          $mongoUser = "${MongoAppUsername}";
          $mongoPassword = "${MongoAppPassword}";
          $uri = "mongodb://" . rawurlencode($mongoUser) . ":" . rawurlencode($mongoPassword) . "@$mongoIp:27017/civicnexus?authSource=civicnexus";
        
          try {
              require '/var/www/html/vendor/autoload.php';
              $client = new MongoDB\Client($uri, [], [
                  'serverSelectionTimeoutMS' => 2000,
                  'connectTimeoutMS' => 2000
              ]);
              $db = $client->civicnexus;
          ?>
          <!DOCTYPE html>
          <html>
          <head>
              <title>CivicNexus Smart City Dashboard</title>
              <style>
                  body { font-family: Arial, sans-serif; margin: 2em; background-color: #f4f4f4; color: #333; }
                h1 { color: #005ea8; }
                  details { margin-bottom: 1.5em; }
                summary { font-size: 1.2em; font-weight: bold; color: #005ea8; cursor: pointer; }
                  table { border-collapse: collapse; width: 100%; margin-top: 1em; box-shadow: 0 2px 3px rgba(0,0,0,0.1); }
                  th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
                th { background-color: #005ea8; color: white; }
                  tr:nth-child(even) { background-color: #f9f9f9; }
                  .error { color: red; font-weight: bold; }
                  pre { margin: 0; font-size: 0.9em; }
              </style>
          </head>
          <body>
              <h1>CivicNexus Live City Operations Data</h1>
        
              <!-- Urban and Environmental Data -->
              <details open>
              <summary>Urban & Environmental Data</summary>
                <table>
                <tr><th>Record ID</th><th>Data Type</th><th>Location</th><th>Reading</th><th>Timestamp</th></tr>
                <?php foreach ($db->urban_environment_data->find() as $doc): ?>
                        <tr>
                    <td><?= htmlspecialchars($doc['record_id'] ?? 'N/A') ?></td>
                    <td><?= htmlspecialchars($doc['data_type'] ?? 'N/A') ?></td>
                    <td><?= htmlspecialchars($doc['location'] ?? 'N/A') ?></td>
                    <td><?= htmlspecialchars($doc['reading_value'] ?? 'N/A') ?> <?= htmlspecialchars($doc['unit'] ?? '') ?></td>
                    <td><?= $doc['timestamp'] ? htmlspecialchars($doc['timestamp']->toDateTime()->format('Y-m-d H:i:s')) : 'N/A' ?></td>
                        </tr>
                    <?php endforeach; ?>
                </table>
              </details>
        
              <!-- Personnel Data Summary -->
              <details>
              <summary>Personnel Data Summary</summary>
                <table>
                <tr><th>Collection</th><th>Record Count</th><th>Display Status</th></tr>
                <tr>
                  <td>personnel_data</td>
                  <td><?= htmlspecialchars((string) $db->personnel_data->countDocuments()) ?></td>
                  <td>Restricted from public dashboard view</td>
                </tr>
                </table>
              </details>
        
              <!-- System & Operational Logs -->
              <details>
              <summary>System & Operational Logs</summary>
                <table>
                <tr><th>Log ID</th><th>Timestamp</th><th>Subsystem</th><th>Event Type</th><th>Details</th></tr>
                <?php foreach ($db->system_operational_logs->find() as $doc): ?>
                        <tr>
                            <td><?= htmlspecialchars($doc['log_id'] ?? 'N/A') ?></td>
                            <td><?= $doc['timestamp'] ? htmlspecialchars($doc['timestamp']->toDateTime()->format('Y-m-d H:i:s')) : 'N/A' ?></td>
                    <td><?= htmlspecialchars($doc['subsystem'] ?? 'N/A') ?></td>
                            <td><?= htmlspecialchars($doc['event_type'] ?? 'N/A') ?></td>
                            <td>Restricted from public dashboard view</td>
                        </tr>
                    <?php endforeach; ?>
                </table>
              </details>
        
          </body>
          </html>
          <?php
          } catch (Exception $e) {
              error_log("Dashboard database error: " . $e->getMessage());
              echo "<p class='error'>Dashboard data is not available right now. Please check the application logs.</p>";
          }
          ?>
          EOF

          cat <<'EOF' > /var/www/html/health.php
          <?php
          ini_set('display_errors', 0);
          ini_set('log_errors', 1);
          header('Content-Type: application/json');

          $mongoIp = "${MongoEC2Instance.PrivateIp}";
          $mongoUser = "${MongoAppUsername}";
          $mongoPassword = "${MongoAppPassword}";
          $uri = "mongodb://" . rawurlencode($mongoUser) . ":" . rawurlencode($mongoPassword) . "@$mongoIp:27017/civicnexus?authSource=civicnexus";

          try {
              require '/var/www/html/vendor/autoload.php';
              $client = new MongoDB\Client($uri, [], [
                  'serverSelectionTimeoutMS' => 2000,
                  'connectTimeoutMS' => 2000
              ]);
              $client->selectDatabase('civicnexus')->command(['ping' => 1]);

              echo json_encode([
                  'service' => 'civicnexus-dashboard',
                  'status' => 'ok',
                  'database' => 'reachable'
              ]);
          } catch (Exception $e) {
              error_log("Health check database error: " . $e->getMessage());
              http_response_code(503);
              echo json_encode([
                  'service' => 'civicnexus-dashboard',
                  'status' => 'degraded',
                  'database' => 'unreachable'
              ]);
          }
          ?>
          EOF
        
          # Run Composer as ec2-user, then restore ownership
          chown -R ec2-user:ec2-user /var/www/html
          cd /var/www/html
          sudo -u ec2-user composer require 'mongodb/mongodb:^1.20'
          rm -f /usr/local/bin/composer
          rm -rf /root/.cache/composer /tmp/pear
          dnf remove -y gcc make php-devel php-pear || true
          dnf clean all
          chown -R apache:apache /var/www/html
          chmod -R 755 /var/www/html
        
          # Enable and start services
          systemctl enable php-fpm
          systemctl start php-fpm
          systemctl enable httpd
          systemctl start httpd
          systemctl restart httpd
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-web-server-instance-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  # ------------------------------------------------------------#
  # Asset 3: VDI Instance (Student 3 - Conditional)
  # ------------------------------------------------------------#
  VDISecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Condition: CreateVDI
    Properties:
      GroupDescription: 'Insecure - Allows public RDP traffic'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-vdi-sg-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  VDIInstance:
    Type: 'AWS::EC2::Instance'
    Condition: CreateVDI
    Properties:
      InstanceType: t3.medium
      ImageId: ami-0efee5160a1079475 # Windows Server 2025 Base
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet1 # Insecurely placed in a public subnet for easy access
      SecurityGroupIds:
        - !Ref VDISecurityGroup
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-vdi-instance-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName
          
Outputs:
  WebServerPublicIP:
    Description: 'Public IP address of the Web Server'
    Value: !GetAtt WebServerInstance.PublicIp
  WebServerHealthURL:
    Description: 'Simple health endpoint for the web dashboard'
    Value: !Sub 'http://${WebServerInstance.PublicIp}/health.php'
  MongoServerPrivateIP:
    Description: 'Private IP used by the web application to reach MongoDB'
    Value: !GetAtt MongoEC2Instance.PrivateIp
  MongoServerSubnetId:
    Description: 'Private subnet used by the MongoDB EC2 instance'
    Value: !Ref PrivateSubnet1
  MongoServerPublicIP:
    Description: 'Secure stack does not assign a public IP to MongoDB'
    Value: 'None'
  NatGatewayId:
    Description: 'NAT Gateway used for private subnet outbound setup access'
    Value: !Ref NatGateway
  VDIInstanceId:
    Description: 'Instance ID of the VDI instance (if created)'
    Condition: CreateVDI
    Value: !Ref VDIInstance
