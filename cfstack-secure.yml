      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
        
          # Update packages
          dnf update -y
        
          # Add MongoDB repository
          cat <<EOF > /etc/yum.repos.d/mongodb-org-7.0.repo
          [mongodb-org-7.0]
          name=MongoDB Repository
          baseurl=https://repo.mongodb.org/yum/amazon/2023/mongodb-org/7.0/x86_64/
          gpgcheck=1
          enabled=1
          gpgkey=https://www.mongodb.org/static/pgp/server-7.0.asc
          EOF
        
          # Install the web server and PHP packages
          dnf install -y httpd php php-fpm php-pear php-devel gcc make \
                         php-cli php-json php-openssl unzip libzstd-devel
        
          # Composer needs HOME set during install
          export HOME=/root
          
          # Install Composer globally
          curl -sS https://getcomposer.org/installer | php
          mv composer.phar /usr/local/bin/composer
          chmod +x /usr/local/bin/composer
          composer --version
        
          # Install MongoDB PHP Driver via PECL
          pecl channel-update pecl.php.net
          printf "\n" | pecl install mongodb-1.21.2
          echo "extension=mongodb.so" > /etc/php.d/50-mongodb.ini
        
          # Log errors instead of showing them on the page
          sed -i 's/^display_errors = .*/display_errors = Off/' /etc/php.ini
          sed -i 's/^log_errors = .*/log_errors = On/' /etc/php.ini
        
          # Allow Apache network access
          setsebool -P httpd_can_network_connect 1

          # Reduce HTTP information leakage from Apache responses
          cat <<'EOF' > /etc/httpd/conf.d/security-headers.conf
          ServerTokens Prod
          ServerSignature Off
          TraceEnable Off
          Header always set X-Content-Type-Options "nosniff"
          Header always set X-Frame-Options "DENY"
          Header always set Referrer-Policy "no-referrer"
          Header always set Cache-Control "no-store"
          Header always set Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; style-src 'self' 'unsafe-inline'"
          Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"
          <Directory "/var/www/html">
              Options -Indexes
          </Directory>
          <Directory "/var/www/html/internal">
              Options -Indexes
              Require ip 10.0.0.0/16
          </Directory>
          EOF

          # Keep database credentials outside the public web root
          mkdir -p /etc/civicnexus
          cat <<'EOF' > /etc/civicnexus/app.env
          MONGO_HOSTS="${MongoEC2Instance.PrivateIp}:27017,${MongoReplicaInstance2.PrivateIp}:27017,${MongoReplicaInstance3.PrivateIp}:27017"
          MONGO_USER="${MongoAppUsername}"
          MONGO_PASSWORD="${MongoAppPassword}"
          MONGO_REPLICA_SET="rs0"
          EOF
          chown root:apache /etc/civicnexus
          chown root:apache /etc/civicnexus/app.env
          chmod 750 /etc/civicnexus
          chmod 640 /etc/civicnexus/app.env
        
          # Write dashboard app
