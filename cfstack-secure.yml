            <footer>TravelQuest trial API: PHP endpoints under /api/402/ with bearer-token authentication.</footer>

            <script>
              const statusEl = document.getElementById('status');
              const gridEl = document.getElementById('destinations');
              const formEl = document.getElementById('destination-form');
              const tokenEl = document.getElementById('token');
              const storedToken = sessionStorage.getItem('travelquestApiToken') || '';
              tokenEl.value = storedToken;

              function escapeHtml(value) {
                return String(value || '').replace(/[&<>"']/g, function (char) {
                  return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                  }[char];
                });
              }

              async function api(path, options) {
                const token = sessionStorage.getItem('travelquestApiToken') || '';
                const request = options || {};
                const headers = new Headers(request.headers || {});
                if (token) {
                  headers.set('Authorization', 'Bearer ' + token);
                }
                const response = await fetch(path, Object.assign({}, request, { headers: headers }));
                const text = await response.text();
                let body = {};
                if (text) {
                  body = JSON.parse(text);
                }
                if (!response.ok) {
                  throw new Error(body.message || ('API request failed with status ' + response.status));
                }
                return body;
              }

              function renderDestination(item) {
                const card = document.createElement('article');
                card.className = 'destination';
                const imageUrl = item.imageUrl || 'https://images.unsplash.com/photo-1506973035872-a4ec16b8e8d9?auto=format&fit=crop&w=1200&q=80';
                card.innerHTML =
                  '<img src="' + escapeHtml(imageUrl) + '" alt="">' +
                  '<div class="body">' +
                  '<h3>' + escapeHtml(item.name) + '</h3>' +
                  '<p><strong>' + escapeHtml(item.location || 'Australia') + '</strong></p>' +
                  '<p>' + escapeHtml(item.description || 'No description added yet.') + '</p>' +
                  '<div class="comments"><p class="comment">Loading comments...</p></div>' +
                  '<form class="inline-form">' +
                  '<input name="author" placeholder="Name" value="Visitor">' +
                  '<input name="text" placeholder="Comment" required>' +
                  '<button type="submit">Add comment</button>' +
                  '</form>' +
                  '</div>';

                const commentsEl = card.querySelector('.comments');
                const commentForm = card.querySelector('.inline-form');
                loadComments(item.id, commentsEl);
                commentForm.addEventListener('submit', async function (event) {
                  event.preventDefault();
                  const data = new FormData(commentForm);
                  await api('/api/402/comments.php?destinationId=' + encodeURIComponent(item.id), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      author: data.get('author') || 'Visitor',
                      text: data.get('text') || ''
                    })
                  });
                  commentForm.reset();
                  await loadComments(item.id, commentsEl);
                });
                return card;
              }

              async function loadComments(destinationId, container) {
                try {
                  const body = await api('/api/402/comments.php?destinationId=' + encodeURIComponent(destinationId));
                  const comments = body.items || [];
                  if (!comments.length) {
                    container.innerHTML = '<p class="comment">No comments yet.</p>';
                    return;
                  }
                  container.innerHTML = comments.map(function (comment) {
                    return '<p class="comment"><strong>' + escapeHtml(comment.author) + '</strong>: ' + escapeHtml(comment.text) + '</p>';
                  }).join('');
                } catch (err) {
                  container.innerHTML = '<p class="comment">' + escapeHtml(err.message) + '</p>';
                }
              }

              async function loadDestinations() {
                gridEl.innerHTML = '';
                try {
                  const body = await api('/api/402/destinations.php');
                  const items = body.items || [];
                  if (!items.length) {
                    statusEl.textContent = 'No destinations have been added yet.';
                    return;
                  }
                  items.forEach(function (item) {
                    gridEl.appendChild(renderDestination(item));
                  });
                  statusEl.textContent = 'Loaded ' + items.length + ' destinations from MongoDB.';
                } catch (err) {
                  statusEl.textContent = err.message;
                }
              }

              document.getElementById('save-token').addEventListener('click', function () {
                sessionStorage.setItem('travelquestApiToken', tokenEl.value.trim());
                statusEl.textContent = 'Token saved for this browser session.';
                loadDestinations();
              });

              document.getElementById('check-health').addEventListener('click', async function () {
                try {
                  const body = await api('/api/402/health.php');
                  statusEl.textContent = 'API status: ' + body.status + ', database: ' + body.database + '.';
                } catch (err) {
                  statusEl.textContent = err.message;
                }
              });

              document.getElementById('refresh').addEventListener('click', loadDestinations);

              formEl.addEventListener('submit', async function (event) {
                event.preventDefault();
                const data = new FormData(formEl);
                try {
                  await api('/api/402/destinations.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      name: data.get('name') || '',
                      location: data.get('location') || '',
                      imageUrl: data.get('imageUrl') || '',
                      description: data.get('description') || ''
                    })
                  });
                  formEl.reset();
                  await loadDestinations();
                } catch (err) {
                  statusEl.textContent = err.message;
                }
              });

              if (storedToken) {
                loadDestinations();
              }
            </script>
          </body>
          </html>
          EOF
        
          # Run Composer as ec2-user, then restore ownership
          chown -R ec2-user:ec2-user /var/www/html
          cd /var/www/html
          sudo -u ec2-user composer require 'mongodb/mongodb:^1.20'
          rm -f /usr/local/bin/composer
          rm -rf /root/.cache/composer /tmp/pear
          dnf remove -y gcc make php-devel php-pear || true
          dnf clean all
          chown -R apache:apache /var/www/html
          chmod -R 755 /var/www/html
        
          # Enable and start services
          systemctl enable php-fpm
          systemctl start php-fpm
          systemctl enable httpd
          systemctl start httpd
          systemctl restart httpd
      Tags:
        - Key: Name
          Value: !Sub 'web_EC2_pantelis_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  WebServerElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub 'web_EIP_pantelis_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  WebServerElasticIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt WebServerElasticIP.AllocationId
      InstanceId: !Ref WebServerInstance

  # ------------------------------------------------------------#
  # Asset 3: VDI Instance (Student 3 - Conditional)
  # ------------------------------------------------------------#
  VDISecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Condition: CreateVDI
    Properties:
      GroupDescription: 'Insecure - Allows public RDP traffic'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub 'vdi_SG_shared_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  VDIInstance:
    Type: 'AWS::EC2::Instance'
    Condition: CreateVDI
    Properties:
      InstanceType: t3.medium
      ImageId: ami-0efee5160a1079475 # Windows Server 2025 Base
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Ref PublicSubnet1 # Insecurely placed in a public subnet for easy access
          GroupSet:
            - !Ref VDISecurityGroup
      Tags:
        - Key: Name
          Value: !Sub 'vdi_EC2_shared_${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName
          
Outputs:
  WebServerPublicIP:
    Description: 'Public IP address of the Web Server'
    Value: !Ref WebServerElasticIP
  WebServerHealthURL:
    Description: 'Simple health endpoint for the web dashboard'
    Value: !Sub 'http://${WebServerElasticIP}/health.php'
  TravelQuest402URL:
    Description: 'Static 402AZ TravelQuest trial page served by the web server'
    Value: !Sub 'http://${WebServerElasticIP}/402/'
  TravelQuest402ApiHealthURL:
    Description: 'Bearer-token protected health endpoint for the MongoDB-backed 402 trial API'
    Value: !Sub 'http://${WebServerElasticIP}/api/402/health.php'
  MongoServerPrivateIP:
    Description: 'Private IP of the first MongoDB replica set member'
    Value: !GetAtt MongoEC2Instance.PrivateIp
  MongoServerSubnetId:
    Description: 'Private subnet used by the first MongoDB replica set member'
    Value: !Ref PrivateSubnet1
  MongoReplicaSetName:
    Description: 'MongoDB replica set name'
    Value: 'rs0'
  MongoReplicaPrivateIPs:
    Description: 'Private IP addresses used by the MongoDB replica set'
    Value: !Join [', ', [!GetAtt MongoEC2Instance.PrivateIp, !GetAtt MongoReplicaInstance2.PrivateIp, !GetAtt MongoReplicaInstance3.PrivateIp]]
  MongoReplicaConnectionString:
    Description: 'Replica set connection string format without credentials'
    Value: !Sub 'mongodb://<user>:<password>@${MongoEC2Instance.PrivateIp}:27017,${MongoReplicaInstance2.PrivateIp}:27017,${MongoReplicaInstance3.PrivateIp}:27017/civicnexus?authSource=civicnexus&replicaSet=rs0'
  MongoServerPublicIP:
    Description: 'Secure stack does not assign a public IP to MongoDB'
    Value: 'None'
  NatGatewayId:
    Description: 'NAT Gateway used for private subnet outbound setup access'
    Value: !Ref NatGateway
  OpenVPNServerPublicIP:
    Description: 'Public IP address of the OpenVPN admin server'
    Value: !Ref OpenVPNElasticIP
  OpenVPNClientConfigPath:
    Description: 'Client profile path on the OpenVPN server'
    Value: '/home/ec2-user/civicnexus-vpn.ovpn'
  MongoBackupBucketName:
    Description: 'Encrypted S3 bucket used for MongoDB backup and restore evidence'
    Condition: CreateAdvancedEvidenceResources
    Value: !Ref MongoBackupBucket
  VpcFlowLogGroupName:
    Description: 'CloudWatch Logs group used by VPC Flow Logs'
    Condition: CreateAdvancedEvidenceResources
    Value: !Ref VpcFlowLogGroup
  VpcFlowLogId:
    Description: 'VPC Flow Log resource used for accepted and rejected traffic evidence'
    Condition: CreateAdvancedEvidenceResources
    Value: !Ref VpcFlowLog
  VDIInstanceId:
    Description: 'Instance ID of the VDI instance (if created)'
    Condition: CreateVDI
    Value: !Ref VDIInstance
