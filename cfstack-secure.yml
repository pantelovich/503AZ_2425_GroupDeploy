              if ($config === false) {
                  throw new RuntimeException('Application configuration is missing.');
              }

              $mongoHosts = $config['MONGO_HOSTS'];
              $mongoUser = $config['MONGO_USER'];
              $mongoPassword = $config['MONGO_PASSWORD'];
              $replicaSet = $config['MONGO_REPLICA_SET'] ?? 'rs0';
              $uri = "mongodb://" . rawurlencode($mongoUser) . ":" . rawurlencode($mongoPassword) . "@$mongoHosts/civicnexus?authSource=civicnexus&replicaSet=" . rawurlencode($replicaSet);

              require '/var/www/html/vendor/autoload.php';
              $client = new MongoDB\Client($uri, [], [
                  'serverSelectionTimeoutMS' => 2000,
                  'connectTimeoutMS' => 2000
              ]);
              $db = $client->civicnexus;
          ?>
          <!DOCTYPE html>
          <html>
          <head>
              <title>CivicNexus Smart City Dashboard</title>
              <style>
                  body { font-family: Arial, sans-serif; margin: 2em; background-color: #f4f4f4; color: #333; }
                h1 { color: #005ea8; }
                  details { margin-bottom: 1.5em; }
                summary { font-size: 1.2em; font-weight: bold; color: #005ea8; cursor: pointer; }
                  table { border-collapse: collapse; width: 100%; margin-top: 1em; box-shadow: 0 2px 3px rgba(0,0,0,0.1); }
                  th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
                th { background-color: #005ea8; color: white; }
                  tr:nth-child(even) { background-color: #f9f9f9; }
                  .error { color: red; font-weight: bold; }
                  pre { margin: 0; font-size: 0.9em; }
              </style>
          </head>
          <body>
              <h1>CivicNexus Live City Operations Data</h1>
        
              <!-- Urban and Environmental Data -->
              <details open>
              <summary>Urban & Environmental Data</summary>
                <table>
                <tr><th>Record ID</th><th>Data Type</th><th>Location</th><th>Reading</th><th>Timestamp</th></tr>
                <?php foreach ($db->urban_environment_data->find() as $doc): ?>
                        <tr>
