          <?php
          ini_set('display_errors', 0);
          ini_set('log_errors', 1);
          header('Content-Type: application/json');
          header('Cache-Control: no-store');

          function apiReply($status, $body) {
              http_response_code($status);
              echo json_encode($body);
              exit;
          }

          function cleanTimestamp($value) {
              if ($value instanceof MongoDB\BSON\UTCDateTime) {
                  return $value->toDateTime()->format('Y-m-d H:i:s');
              }
              return $value ? (string) $value : null;
          }

          try {
              $config = parse_ini_file('/etc/civicnexus/app.env');
              if ($config === false) {
                  throw new RuntimeException('Application configuration is missing.');
              }

              $mongoHosts = $config['MONGO_HOSTS'];
              $mongoUser = $config['MONGO_USER'];
              $mongoPassword = $config['MONGO_PASSWORD'];
              $replicaSet = $config['MONGO_REPLICA_SET'] ?? 'rs0';
              $uri = "mongodb://" . rawurlencode($mongoUser) . ":" . rawurlencode($mongoPassword) . "@$mongoHosts/civicnexus?authSource=civicnexus&replicaSet=" . rawurlencode($replicaSet);

              require '/var/www/html/vendor/autoload.php';
              $client = new MongoDB\Client($uri, [], [
                  'serverSelectionTimeoutMS' => 2000,
                  'connectTimeoutMS' => 2000
              ]);
              $db = $client->civicnexus;

              if ($_SERVER['REQUEST_METHOD'] === 'POST') {
                  $payload = json_decode(file_get_contents('php://input'), true);
                  if (!is_array($payload)) {
                      apiReply(400, ['message' => 'invalid JSON body']);
                  }

                  $note = trim((string)($payload['note'] ?? ''));
                  if ($note === '' || strlen($note) > 500) {
                      apiReply(400, ['message' => 'note is required and must be under 500 characters']);
                  }

                  $operator = substr((string)($payload['operator'] ?? 'unknown'), 0, 120);
                  $now = new MongoDB\BSON\UTCDateTime();
                  $db->operator_notes->insertOne([
                      'owner' => $operator,
                      'note' => $note,
                      'timestamp' => $now,
                      'source' => 'cognito-api'
                  ]);

                  apiReply(201, [
                      'status' => 'saved',
                      'source' => 'mongodb',
                      'owner' => $operator,
                      'timestamp' => cleanTimestamp($now)
                  ]);
              }

              if ($_SERVER['REQUEST_METHOD'] !== 'GET') {
                  apiReply(405, ['message' => 'method not allowed']);
              }

              $publicRecords = [];
              foreach ($db->urban_environment_data->find([], [
                  'projection' => [
                      '_id' => 0,
                      'record_id' => 1,
                      'data_type' => 1,
                      'location' => 1,
                      'reading_value' => 1,
                      'unit' => 1,
                      'timestamp' => 1
                  ],
                  'limit' => 10
              ]) as $doc) {
                  $publicRecords[] = [
                      'id' => $doc['record_id'] ?? null,
                      'dataType' => $doc['data_type'] ?? null,
                      'location' => $doc['location'] ?? null,
                      'reading' => trim(($doc['reading_value'] ?? '') . ' ' . ($doc['unit'] ?? '')),
                      'timestamp' => cleanTimestamp($doc['timestamp'] ?? null)
                  ];
              }

              apiReply(200, [
                  'service' => 'civicnexus-402-mongodb-api',
                  'status' => 'ok',
                  'source' => 'mongodb',
                  'public_records' => $publicRecords,
                  'personnel_records' => 'restricted',
                  'operational_log_details' => 'restricted',
                  'operator_notes_count' => $db->operator_notes->countDocuments()
              ]);
          } catch (Exception $e) {
              error_log("402 MongoDB API error: " . $e->getMessage());
              apiReply(503, [
                  'service' => 'civicnexus-402-mongodb-api',
                  'status' => 'degraded',
                  'source' => 'mongodb'
              ]);
          }
          ?>
          EOF
        
          # Run Composer as ec2-user, then restore ownership
          chown -R ec2-user:ec2-user /var/www/html
          cd /var/www/html
          sudo -u ec2-user composer require 'mongodb/mongodb:^1.20'
          rm -f /usr/local/bin/composer
          rm -rf /root/.cache/composer /tmp/pear
          dnf remove -y gcc make php-devel php-pear || true
          dnf clean all
          chown -R apache:apache /var/www/html
          find /var/www/html -type d -exec chmod 755 {} \;
          find /var/www/html -type f -exec chmod 644 {} \;
        
          # Enable and start services
          systemctl enable php-fpm
          systemctl start php-fpm
          systemctl enable httpd
          systemctl start httpd
          systemctl restart httpd
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-web-server-instance-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  # ------------------------------------------------------------#
  # Optional VDI Instance (disabled by default for the two-person build)
  # ------------------------------------------------------------#
  VDISecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Condition: CreateVDI
    Properties:
      GroupDescription: 'Private VDI security group - no public RDP'
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: 10.0.0.2/32
        - IpProtocol: -1
          CidrIp: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-vdi-sg-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  VDIInstance:
    Type: 'AWS::EC2::Instance'
    Condition: CreateVDI
    Properties:
      InstanceType: t3.medium
      ImageId: ami-0efee5160a1079475 # Windows Server 2025 Base
      KeyName: !Ref KeyName
      SubnetId: !Ref PrivateSubnet2
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
        HttpPutResponseHopLimit: 1
        InstanceMetadataTags: disabled
      SecurityGroupIds:
        - !Ref VDISecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            Encrypted: true
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-vdi-instance-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName
          
Outputs:
  WebServerPublicIP:
    Description: 'Public IP address of the Web Server'
    Value: !GetAtt WebServerInstance.PublicIp
  WebServerPrivateIP:
    Description: 'Private IP address used by internal API calls to the web server'
    Value: !GetAtt WebServerInstance.PrivateIp
    Export:
      Name: !Sub '${GroupName}-CivicNexusWebPrivateIp'
  WebServerHealthURL:
    Description: 'Simple health endpoint for the web dashboard'
    Value: !Sub 'http://${WebServerInstance.PublicIp}/health.php'
  CivicNexusVpcId:
    Description: 'VPC used by the secure CivicNexus stack'
    Value: !Ref VPC
    Export:
      Name: !Sub '${GroupName}-CivicNexusVpcId'
  PrivateSubnet1Id:
    Description: 'First private subnet used by the secure stack'
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub '${GroupName}-CivicNexusPrivateSubnet1Id'
  PrivateSubnet2Id:
    Description: 'Second private subnet used by the secure stack'
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub '${GroupName}-CivicNexusPrivateSubnet2Id'
  WebServerSecurityGroupId:
    Description: 'Security group used by the web server'
    Value: !Ref WebServerSecurityGroup
    Export:
      Name: !Sub '${GroupName}-CivicNexusWebSecurityGroupId'
  MongoServerPrivateIP:
    Description: 'Private IP of the first MongoDB replica set member'
    Value: !GetAtt MongoEC2Instance.PrivateIp
  MongoServerSubnetId:
    Description: 'Private subnet used by the first MongoDB replica set member'
    Value: !Ref PrivateSubnet1
  MongoReplicaSetName:
    Description: 'MongoDB replica set name'
    Value: 'rs0'
  MongoReplicaPrivateIPs:
    Description: 'Private IP addresses used by the MongoDB replica set'
    Value: !Join [', ', [!GetAtt MongoEC2Instance.PrivateIp, !GetAtt MongoReplicaInstance2.PrivateIp, !GetAtt MongoReplicaInstance3.PrivateIp]]
  MongoReplicaConnectionString:
    Description: 'Replica set connection string format without credentials'
    Value: !Sub 'mongodb://<user>:<password>@${MongoEC2Instance.PrivateIp}:27017,${MongoReplicaInstance2.PrivateIp}:27017,${MongoReplicaInstance3.PrivateIp}:27017/civicnexus?authSource=civicnexus&replicaSet=rs0'
  MongoServerPublicIP:
    Description: 'Secure stack does not assign a public IP to MongoDB'
    Value: 'None'
  NatGatewayId:
    Description: 'NAT Gateway used for private subnet outbound setup access'
    Value: !Ref NatGateway
  MongoBackupBucketName:
    Description: 'Encrypted S3 bucket used for MongoDB backup and restore evidence'
    Value: !Ref MongoBackupBucket
  VpcFlowLogGroupName:
    Description: 'CloudWatch Logs group used by VPC Flow Logs'
    Condition: CreateEvidenceServices
    Value: !Ref VpcFlowLogGroup
  VpcFlowLogId:
    Description: 'VPC Flow Log resource used for accepted and rejected traffic evidence'
    Condition: CreateEvidenceServices
    Value: !Ref VpcFlowLog
  OpenVPNServerPublicIP:
    Description: 'Public IP address of the optional OpenVPN admin server'
    Condition: CreateOpenVPN
    Value: !Ref OpenVPNElasticIP
  OpenVPNClientConfigPath:
    Description: 'Client profile path on the optional OpenVPN server after manual setup'
    Condition: CreateOpenVPN
    Value: '/home/ec2-user/civicnexus-vpn.ovpn'
  VDIInstanceId:
    Description: 'Instance ID of the VDI instance (if created)'
    Condition: CreateVDI
    Value: !Ref VDIInstance
