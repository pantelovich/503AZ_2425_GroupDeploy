              $uri = "mongodb://" . rawurlencode($mongoUser) . ":" . rawurlencode($mongoPassword) . "@$mongoHosts/civicnexus?authSource=civicnexus&replicaSet=" . rawurlencode($replicaSet);

              require '/var/www/html/vendor/autoload.php';
              $client = new MongoDB\Client($uri, [], [
                  'serverSelectionTimeoutMS' => 2000,
