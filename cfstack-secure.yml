                    <td><?= $doc['timestamp'] ? htmlspecialchars($doc['timestamp']->toDateTime()->format('Y-m-d H:i:s')) : 'N/A' ?></td>
                        </tr>
                    <?php endforeach; ?>
                </table>
              </details>
        
              <!-- Personnel Data Summary -->
              <details>
              <summary>Personnel Data Summary</summary>
                <table>
                <tr><th>Collection</th><th>Record Count</th><th>Display Status</th></tr>
