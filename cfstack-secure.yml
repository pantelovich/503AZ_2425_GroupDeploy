AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation stack for the 503AZ CivicNexus project with first webserver security changes.'

Parameters:
  GroupName:
    Type: String
    Description: The unique group name or number to tag resources (e.g., Group-01).
  GroupSize:
    Type: Number
    Description: The number of students in the group.
    Default: 2
    AllowedValues: [2, 3]
  EnableVDI:
    Type: String
    Description: Set to true only if the optional third VDI asset is required.
    Default: 'false'
    AllowedValues: ['true', 'false']
  EnableEvidenceServices:
    Type: String
    Description: Set to true only if the lab allows IAM roles for Flow Logs and S3 backup upload evidence.
    Default: 'false'
    AllowedValues: ['true', 'false']
  EnableOpenVPN:
    Type: String
    Description: Set to true only when collecting OpenVPN admin access evidence.
    Default: 'false'
    AllowedValues: ['true', 'false']
  AdminAccessCidr:
    Type: String
    Description: CIDR allowed to reach the optional OpenVPN admin server. Use your public IP with /32 when VPN is enabled.
    Default: 127.0.0.1/32
    AllowedPattern: '^(([0-9]{1,3}\.){3}[0-9]{1,3})/([0-9]|[1-2][0-9]|3[0-2])$'
  KeyName:
    Type: 'AWS::EC2::KeyPair::KeyName'
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instances.
  MongoAdminUsername:
    Type: String
    Description: Admin username created inside MongoDB.
    Default: mongoAdmin
    AllowedPattern: '^[A-Za-z][A-Za-z0-9_]{2,31}$'
  MongoAdminPassword:
    Type: String
    Description: Admin password for MongoDB. Use letters, numbers, and underscores to avoid URI escaping issues.
    NoEcho: true
    MinLength: 12
    AllowedPattern: '^[A-Za-z0-9_]{12,64}$'
  MongoAppUsername:
    Type: String
    Description: Application username used by the PHP dashboard.
    Default: civicApp
    AllowedPattern: '^[A-Za-z][A-Za-z0-9_]{2,31}$'
  MongoAppPassword:
    Type: String
    Description: Application password for the PHP dashboard MongoDB user. Use letters, numbers, and underscores to avoid URI escaping issues.
    NoEcho: true
    MinLength: 12
    AllowedPattern: '^[A-Za-z0-9_]{12,64}$'
  MongoReplicaKey:
    Type: String
    Description: Shared key used by MongoDB replica set members. Use letters and numbers only.
    NoEcho: true
    MinLength: 32
    AllowedPattern: '^[A-Za-z0-9]{32,128}$'

Conditions:
  CreateVDI: !And
    - !Equals [!Ref GroupSize, 3]
    - !Equals [!Ref EnableVDI, 'true']
  CreateEvidenceServices: !Equals [!Ref EnableEvidenceServices, 'true']
  CreateOpenVPN: !Equals [!Ref EnableOpenVPN, 'true']

Resources:
  # ------------------------------------------------------------#
  # Networking
  # ------------------------------------------------------------#
  VPC:
    Type: 'AWS::EC2::VPC'
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-vpc-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  InternetGateway:
    Type: 'AWS::EC2::InternetGateway'
    Properties:
      Tags:
        - Key: GroupName
          Value: !Ref GroupName

  AttachGateway:
    Type: 'AWS::EC2::VPCGatewayAttachment'
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-public-subnet-1-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  PublicSubnet2:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-public-subnet-2-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  PrivateSubnet1:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-private-subnet-1-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  PrivateSubnet2:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-private-subnet-2-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  PrivateSubnet3:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.12.0/24
      AvailabilityZone: !Select [2, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-private-subnet-3-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName
  
  PublicRouteTable:
    Type: 'AWS::EC2::RouteTable'
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-public-rt-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  DefaultPublicRoute:
    Type: 'AWS::EC2::Route'
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
  
  PublicSubnet1RouteTableAssociation:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable
      
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-private-rt-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  NatGatewayElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-nat-eip-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayElasticIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-nat-gateway-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: NatGateway
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnet1

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnet2

  PrivateSubnet3RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnet3

  PrivateSubnetNetworkAcl:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-private-subnet-acl-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  PrivateSubnetAclInboundMongo:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PrivateSubnetNetworkAcl
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 10.0.0.0/16
      PortRange:
        From: 27017
        To: 27017

  PrivateSubnetAclInboundSshFromVpc:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PrivateSubnetNetworkAcl
      RuleNumber: 110
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 10.0.0.0/16
      PortRange:
        From: 22
        To: 22

  PrivateSubnetAclInboundEphemeralTcp:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PrivateSubnetNetworkAcl
      RuleNumber: 120
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 1024
        To: 65535

  PrivateSubnetAclInboundEphemeralUdp:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PrivateSubnetNetworkAcl
      RuleNumber: 130
      Protocol: 17
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 1024
        To: 65535

  PrivateSubnetAclOutboundHttp:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PrivateSubnetNetworkAcl
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      Egress: true
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 80
        To: 80

  PrivateSubnetAclOutboundHttps:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PrivateSubnetNetworkAcl
      RuleNumber: 110
      Protocol: 6
      RuleAction: allow
      Egress: true
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 443
        To: 443

  PrivateSubnetAclOutboundDnsUdp:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PrivateSubnetNetworkAcl
      RuleNumber: 120
      Protocol: 17
      RuleAction: allow
      Egress: true
      CidrBlock: 10.0.0.2/32
      PortRange:
        From: 53
        To: 53

  PrivateSubnetAclOutboundDnsTcp:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PrivateSubnetNetworkAcl
      RuleNumber: 130
      Protocol: 6
      RuleAction: allow
      Egress: true
      CidrBlock: 10.0.0.2/32
      PortRange:
        From: 53
        To: 53

  PrivateSubnetAclOutboundMongo:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PrivateSubnetNetworkAcl
      RuleNumber: 140
      Protocol: 6
      RuleAction: allow
      Egress: true
      CidrBlock: 10.0.0.0/16
      PortRange:
        From: 27017
        To: 27017

  PrivateSubnetAclOutboundEphemeralTcpToVpc:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PrivateSubnetNetworkAcl
      RuleNumber: 150
      Protocol: 6
      RuleAction: allow
      Egress: true
      CidrBlock: 10.0.0.0/16
      PortRange:
        From: 1024
        To: 65535

  PrivateSubnetAclOutboundEphemeralUdpToVpc:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PrivateSubnetNetworkAcl
      RuleNumber: 160
      Protocol: 17
      RuleAction: allow
      Egress: true
      CidrBlock: 10.0.0.0/16
      PortRange:
        From: 1024
        To: 65535

  PrivateSubnet1NetworkAclAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      NetworkAclId: !Ref PrivateSubnetNetworkAcl

  PrivateSubnet2NetworkAclAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      NetworkAclId: !Ref PrivateSubnetNetworkAcl

  PrivateSubnet3NetworkAclAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet3
      NetworkAclId: !Ref PrivateSubnetNetworkAcl

  # ------------------------------------------------------------#
  # Optional Admin VPN Access (Mike)
  # ------------------------------------------------------------#
  OpenVPNSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Condition: CreateOpenVPN
    Properties:
      GroupDescription: 'Allows administrator OpenVPN access into the VPC'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: udp
          FromPort: 1194
          ToPort: 1194
          CidrIp: !Ref AdminAccessCidr
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AdminAccessCidr
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: 10.0.0.2/32
        - IpProtocol: -1
          CidrIp: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-openvpn-sg-mike-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  OpenVPNInstance:
    Type: 'AWS::EC2::Instance'
    Condition: CreateOpenVPN
    DependsOn: DefaultPublicRoute
    Properties:
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      SourceDestCheck: false
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
        HttpPutResponseHopLimit: 1
        InstanceMetadataTags: disabled
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Ref PublicSubnet2
          GroupSet:
            - !Ref OpenVPNSecurityGroup
      ImageId: ami-00ca32bbc84273381 # Amazon Linux 2023
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            Encrypted: true
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail

          dnf update -y
          dnf install -y openvpn iptables-services openssl

          mkdir -p /etc/openvpn/server /etc/openvpn/client-config /etc/openvpn/pki

          cat <<'EOF' > /home/ec2-user/README_openvpn.txt
          OpenVPN packages are installed by CloudFormation.
          Certificates, routing and the client profile are configured manually.
          Use the repo script: scripts/manual_openvpn_setup.sh.
          EOF

          chown ec2-user:ec2-user /home/ec2-user/README_openvpn.txt
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-openvpn-ec2-mike-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  OpenVPNElasticIP:
    Type: AWS::EC2::EIP
    Condition: CreateOpenVPN
    DependsOn: AttachGateway
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-openvpn-eip-mike-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  OpenVPNElasticIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Condition: CreateOpenVPN
    Properties:
      AllocationId: !GetAtt OpenVPNElasticIP.AllocationId
      InstanceId: !Ref OpenVPNInstance

  VpcFlowLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: CreateEvidenceServices
    Properties:
      RetentionInDays: 7
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-vpc-flow-logs-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  VpcFlowLogsRole:
    Type: AWS::IAM::Role
    Condition: CreateEvidenceServices
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: WriteVpcFlowLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub '${VpcFlowLogGroup.Arn}:*'
      Tags:
        - Key: GroupName
          Value: !Ref GroupName

  VpcFlowLog:
    Type: AWS::EC2::FlowLog
    Condition: CreateEvidenceServices
    Properties:
      DeliverLogsPermissionArn: !GetAtt VpcFlowLogsRole.Arn
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref VpcFlowLogGroup
      ResourceId: !Ref VPC
      ResourceType: VPC
      TrafficType: ALL
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-vpc-flow-log-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  MongoBackupBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteLabBackupsAfterSevenDays
            Status: Enabled
            ExpirationInDays: 7
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-mongodb-backups-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  MongoBackupBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MongoBackupBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt MongoBackupBucket.Arn
              - !Sub '${MongoBackupBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  MongoBackupRole:
    Type: AWS::IAM::Role
    Condition: CreateEvidenceServices
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: MongoBackupS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt MongoBackupBucket.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub '${MongoBackupBucket.Arn}/*'
      Tags:
        - Key: GroupName
          Value: !Ref GroupName

  MongoBackupInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Condition: CreateEvidenceServices
    Properties:
      Roles:
        - !Ref MongoBackupRole

  # ------------------------------------------------------------#
  # Asset 2: MongoDB EC2 Database (Mike)
  # ------------------------------------------------------------#
  MongoSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Allows MongoDB only from approved internal security groups'
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: 10.0.0.2/32
      Tags:
        - Key: Name
          Value: !Sub 'civicnexus-mongodb-sg-${GroupName}'
        - Key: GroupName
          Value: !Ref GroupName

  MongoIngressFromWebServer:
    Type: 'AWS::EC2::SecurityGroupIngress'
    Properties:
      GroupId: !Ref MongoSecurityGroup
      IpProtocol: tcp
      FromPort: 27017
      ToPort: 27017
      SourceSecurityGroupId: !Ref WebServerSecurityGroup

  MongoIngressFromOpenVPN:
    Type: 'AWS::EC2::SecurityGroupIngress'
    Condition: CreateOpenVPN
    Properties:
      GroupId: !Ref MongoSecurityGroup
      IpProtocol: tcp
      FromPort: 27017
      ToPort: 27017
      SourceSecurityGroupId: !Ref OpenVPNSecurityGroup

  MongoSSHFromOpenVPN:
    Type: 'AWS::EC2::SecurityGroupIngress'
    Condition: CreateOpenVPN
    Properties:
      GroupId: !Ref MongoSecurityGroup
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      SourceSecurityGroupId: !Ref OpenVPNSecurityGroup

  MongoIngressFromReplicaMembers:
    Type: 'AWS::EC2::SecurityGroupIngress'
    Properties:
      GroupId: !Ref MongoSecurityGroup
      IpProtocol: tcp
      FromPort: 27017
      ToPort: 27017
      SourceSecurityGroupId: !Ref MongoSecurityGroup

  MongoEgressToReplicaMembers:
    Type: 'AWS::EC2::SecurityGroupEgress'
    Properties:
      GroupId: !Ref MongoSecurityGroup
      IpProtocol: tcp
      FromPort: 27017
      ToPort: 27017
      DestinationSecurityGroupId: !Ref MongoSecurityGroup

  MongoEC2Instance:
    Type: 'AWS::EC2::Instance'
    DependsOn:
      - PrivateDefaultRoute
      - MongoIngressFromReplicaMembers
      - MongoReplicaInstance2
      - MongoReplicaInstance3
    Properties:
      InstanceType: t3.small
      SubnetId: !Ref PrivateSubnet1
      PrivateIpAddress: 10.0.10.10
      KeyName: !Ref KeyName
      IamInstanceProfile: !If [CreateEvidenceServices, !Ref MongoBackupInstanceProfile, !Ref 'AWS::NoValue']
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
        HttpPutResponseHopLimit: 1
        InstanceMetadataTags: disabled
      SecurityGroupIds:
        - !Ref MongoSecurityGroup
      ImageId: ami-00ca32bbc84273381 # Amazon Linux 2023
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            Encrypted: true
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail

          cat <<'EOF' > /etc/yum.repos.d/mongodb-org-7.0.repo
          [mongodb-org-7.0]
          name=MongoDB Repository
          baseurl=https://repo.mongodb.org/yum/amazon/2023/mongodb-org/7.0/x86_64/
          gpgcheck=1
          enabled=1
          gpgkey=https://www.mongodb.org/static/pgp/server-7.0.asc
          EOF
          dnf install -y mongodb-org
          dnf install -y awscli || true

          cat <<'EOF' > /etc/mongo-keyfile
          ${MongoReplicaKey}
          EOF
          chmod 400 /etc/mongo-keyfile
          chown mongod:mongod /etc/mongo-keyfile

          sed -i 's/bindIp: 127.0.0.1/bindIp: 127.0.0.1,10.0.10.10/g' /etc/mongod.conf
          cat <<'EOF' >> /etc/mongod.conf

          replication:
            replSetName: rs0

          security:
            authorization: enabled
            keyFile: /etc/mongo-keyfile
          EOF

          systemctl enable mongod
          systemctl start mongod

          for attempt in {1..30}; do
            if mongosh mongodb://127.0.0.1:27017 --quiet --eval 'db.adminCommand({ping:1})' >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done

          for attempt in {1..30}; do
            if timeout 2 bash -c "</dev/tcp/10.0.11.10/27017" >/dev/null 2>&1 && timeout 2 bash -c "</dev/tcp/10.0.12.10/27017" >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done

          mongosh mongodb://127.0.0.1:27017/admin --quiet --eval 'rs.initiate({_id:"rs0",members:[{_id:0,host:"10.0.10.10:27017",priority:2},{_id:1,host:"10.0.11.10:27017"},{_id:2,host:"10.0.12.10:27017"}]})' || true

          for attempt in {1..30}; do
            if mongosh mongodb://127.0.0.1:27017/admin --quiet --eval 'db.hello().isWritablePrimary' | grep -q true; then
              break
            fi
            sleep 5
          done

          cat <<'EOF' > /tmp/create_admin.js
          db = db.getSiblingDB('admin');
          db.createUser({
              user: "${MongoAdminUsername}",
              pwd: "${MongoAdminPassword}",
              roles: [ { role: "root", db: "admin" } ]
          });
          print("MongoDB admin user created.");
